<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">claude-lens Architecture</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ZONE: Chrome Extension -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="60" width="260" height="320" rx="12" fill="#1e2433" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="160" y="84" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600" letter-spacing="1.5">CHROME EXTENSION</text>

  <!-- Side Panel -->
  <rect x="55" y="95" width="210" height="60" rx="8" fill="#2a3347" stroke="#60a5fa" stroke-width="1"/>
  <text x="160" y="119" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Side Panel</text>
  <text x="160" y="137" text-anchor="middle" fill="#64748b" font-size="10">sidepanel.js · xterm.js</text>

  <!-- Background Service Worker -->
  <rect x="55" y="175" width="210" height="60" rx="8" fill="#2a3347" stroke="#818cf8" stroke-width="1"/>
  <text x="160" y="199" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Background (Service Worker)</text>
  <text x="160" y="217" text-anchor="middle" fill="#64748b" font-size="10">debugger attach · message router</text>

  <!-- Content Script -->
  <rect x="55" y="255" width="210" height="60" rx="8" fill="#2a3347" stroke="#34d399" stroke-width="1"/>
  <text x="160" y="279" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Content Script</text>
  <text x="160" y="297" text-anchor="middle" fill="#64748b" font-size="10">DOM access · JS eval</text>

  <!-- Internal arrows: Side Panel → Background → Content Script -->
  <line x1="160" y1="155" x2="160" y2="175" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="160" y1="235" x2="160" y2="255" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Native Messaging box -->
  <rect x="55" y="340" width="210" height="32" rx="8" fill="#1a2035" stroke="#f59e0b" stroke-width="1"/>
  <text x="160" y="361" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Native Messaging · host.js</text>
  <line x1="160" y1="315" x2="160" y2="340" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-yellow)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- ZONE: Local Server -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="330" y="60" width="260" height="320" rx="12" fill="#1e2433" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="460" y="84" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="600" letter-spacing="1.5">LOCAL SERVER · :19280</text>

  <!-- WS Terminal -->
  <rect x="355" y="95" width="210" height="60" rx="8" fill="#2a3347" stroke="#c084fc" stroke-width="1"/>
  <text x="460" y="117" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">WS /terminal</text>
  <text x="460" y="135" text-anchor="middle" fill="#64748b" font-size="10">Claude CLI I/O · node-pty</text>

  <!-- WS Control -->
  <rect x="355" y="175" width="210" height="60" rx="8" fill="#2a3347" stroke="#c084fc" stroke-width="1"/>
  <text x="460" y="197" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">WS /control</text>
  <text x="460" y="215" text-anchor="middle" fill="#64748b" font-size="10">BridgeService · RPC</text>

  <!-- HTTP API -->
  <rect x="355" y="255" width="210" height="60" rx="8" fill="#2a3347" stroke="#c084fc" stroke-width="1"/>
  <text x="460" y="277" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">HTTP /api/*</text>
  <text x="460" y="295" text-anchor="middle" fill="#64748b" font-size="10">page · tree · network · eval</text>

  <!-- Server started by Native Messaging -->
  <rect x="355" y="340" width="210" height="32" rx="8" fill="#1a2035" stroke="#f59e0b" stroke-width="1"/>
  <text x="460" y="361" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">server/index.js (LaunchAgent)</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ZONE: MCP Server + Claude CLI -->
  <!-- ═══════════════════════════════════════ -->
  <!-- MCP Server -->
  <rect x="630" y="60" width="240" height="150" rx="12" fill="#1e2433" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="750" y="84" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600" letter-spacing="1.5">MCP SERVER</text>
  <rect x="655" y="95" width="190" height="100" rx="8" fill="#2a3347" stroke="#34d399" stroke-width="1"/>
  <text x="750" y="119" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">mcp-server.js</text>
  <text x="750" y="139" text-anchor="middle" fill="#64748b" font-size="10">get_current_page</text>
  <text x="750" y="154" text-anchor="middle" fill="#64748b" font-size="10">get_page_tree · get_element_info</text>
  <text x="750" y="169" text-anchor="middle" fill="#64748b" font-size="10">run_js · network_capture (13 tools)</text>

  <!-- Claude Code CLI -->
  <rect x="630" y="240" width="240" height="140" rx="12" fill="#1e2433" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="750" y="264" text-anchor="middle" fill="#f43f5e" font-size="11" font-weight="600" letter-spacing="1.5">CLAUDE CODE CLI</text>
  <rect x="655" y="275" width="190" height="90" rx="8" fill="#2a3347" stroke="#fb7185" stroke-width="1"/>
  <text x="750" y="298" text-anchor="middle" fill="#fda4af" font-size="12" font-weight="600">claude (binary)</text>
  <text x="750" y="318" text-anchor="middle" fill="#64748b" font-size="10">node-pty spawn</text>
  <text x="750" y="338" text-anchor="middle" fill="#64748b" font-size="10">interactive terminal session</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ARROWS between zones -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Side Panel ↔ WS /terminal -->
  <path d="M 265 115 C 300 115, 320 115, 355 115" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr-blue)"/>
  <path d="M 355 125 C 320 125, 300 125, 265 125" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="310" y="110" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">WS terminal</text>

  <!-- Side Panel ↔ WS /control -->
  <path d="M 265 195 C 300 195, 320 195, 355 195" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arr-indigo)"/>
  <path d="M 355 205 C 320 205, 300 205, 265 205" fill="none" stroke="#818cf8" stroke-width="2" marker-end="url(#arr-indigo)"/>
  <text x="310" y="190" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="600">WS control</text>

  <!-- Side Panel → HTTP API -->
  <path d="M 265 275 C 300 275, 320 275, 355 275" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="310" y="270" text-anchor="middle" fill="#a855f7" font-size="9">HTTP</text>

  <!-- Native Messaging → server (spawn) -->
  <path d="M 265 356 C 300 356, 320 356, 355 356" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-yellow)"/>
  <text x="310" y="351" text-anchor="middle" fill="#f59e0b" font-size="9">spawn</text>

  <!-- MCP Server → HTTP /api/* -->
  <path d="M 630 150 C 595 150, 580 275, 565 275" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="604" y="205" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600">HTTP REST</text>

  <!-- MCP Server ↔ Claude CLI (stdio) -->
  <path d="M 750 210 L 750 240" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M 760 240 L 760 210" fill="none" stroke="#f43f5e" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="790" y="228" text-anchor="middle" fill="#f43f5e" font-size="9" font-weight="600">stdio</text>

  <!-- WS /terminal ↔ Claude CLI -->
  <path d="M 565 125 C 600 125, 620 298, 655 298" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M 655 308 C 620 308, 600 135, 565 135" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="620" y="220" text-anchor="middle" fill="#fb7185" font-size="9" font-weight="600">node-pty</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEGEND / FLOW STEP NUMBERS -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="410" width="840" height="190" rx="12" fill="#161b27" stroke="#334155" stroke-width="1"/>
  <text x="450" y="432" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">STARTUP FLOW</text>

  <!-- Steps -->
  <!-- Step boxes -->
  <rect x="48" y="442" width="120" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="108" y="461" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">① Icon Click</text>
  <text x="108" y="477" text-anchor="middle" fill="#64748b" font-size="9">Side Panel opens</text>

  <rect x="188" y="442" width="120" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="248" y="461" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">② Connect</text>
  <text x="248" y="477" text-anchor="middle" fill="#64748b" font-size="9">Native Msg → host.js</text>

  <rect x="328" y="442" width="120" height="50" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="388" y="461" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">③ Server Spawn</text>
  <text x="388" y="477" text-anchor="middle" fill="#64748b" font-size="9">server/index.js :19280</text>

  <rect x="468" y="442" width="120" height="50" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="528" y="461" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">④ WS Connect</text>
  <text x="528" y="477" text-anchor="middle" fill="#64748b" font-size="9">/terminal + /control</text>

  <rect x="608" y="442" width="120" height="50" rx="6" fill="#1e293b" stroke="#f43f5e" stroke-width="1"/>
  <text x="668" y="461" text-anchor="middle" fill="#fda4af" font-size="10" font-weight="600">⑤ Claude Start</text>
  <text x="668" y="477" text-anchor="middle" fill="#64748b" font-size="9">node-pty spawn</text>

  <rect x="748" y="442" width="110" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="803" y="461" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">⑥ MCP Ready</text>
  <text x="803" y="477" text-anchor="middle" fill="#64748b" font-size="9">13 tools available</text>

  <!-- Step arrows -->
  <line x1="168" y1="467" x2="188" y2="467" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="308" y1="467" x2="328" y2="467" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="448" y1="467" x2="468" y2="467" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="588" y1="467" x2="608" y2="467" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="728" y1="467" x2="748" y2="467" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- MCP Query flow description -->
  <text x="450" y="518" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.8">MCP QUERY FLOW</text>
  <text x="450" y="535" text-anchor="middle" fill="#475569" font-size="10">
    Claude Code  →  mcp-server.js  →  HTTP /api/*  →  BridgeService  →  WS /control  →  Extension  →  Content Script (DOM)
  </text>
  <text x="450" y="553" text-anchor="middle" fill="#334155" font-size="10">
    ←───────────────────────────────── result reversed ──────────────────────────────────
  </text>

  <!-- LaunchAgent note -->
  <rect x="48" y="568" width="804" height="24" rx="6" fill="#0f1117" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="585" text-anchor="middle" fill="#475569" font-size="10">
    LaunchAgent (com.claude-lens.server) ensures server auto-starts at login independently of Native Messaging
  </text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ARROW MARKERS -->
  <!-- ═══════════════════════════════════════ -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f43f5e"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
