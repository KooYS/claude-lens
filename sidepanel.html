<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Lens</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="terminal">
    <div class="terminal__output" id="output"></div>
    <div class="terminal__input-line">
      <span class="prompt">$</span>
      <input type="text" id="input" class="terminal__input" autofocus spellcheck="false" autocomplete="off" placeholder="Type a command..." />
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
