<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Lens</title>
    <link rel="stylesheet" href="libs/xterm/xterm.css" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="toolbar">
      <button id="pickBtn" class="tool-btn" title="Pick element (inspect)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path
            d="M2 2L7 14L9 9L14 7L2 2Z"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
          />
          <path
            d="M9 9L13 13"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <span class="toolbar__label" id="toolbarLabel">Claude Lens</span>
      <div class="toolbar__spacer"></div>
      <button id="settingsBtn" class="tool-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
    <div id="setup" class="setup visible">
      <div class="setup__group">
        <label class="setup__label">Server Port</label>
        <input id="portInput" class="setup__input" type="number" min="1" max="65535" value="19280" placeholder="19280" />
      </div>
      <div class="setup__group">
        <label class="setup__label">Claude CLI</label>
        <button id="claudeBinBtn" class="setup__folder-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M6 2L3 6h3v4H4l3 4 3-4H8V6h3L8 2 6 2z" stroke="currentColor" stroke-width="1.3" fill="none"/>
          </svg>
          <span class="setup__folder-btn-text" id="claudeBinLabel">Detecting...</span>
        </button>
      </div>
      <div class="setup__group">
        <label class="setup__label">Working Directory</label>
        <button id="folderBtn" class="setup__folder-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path
              d="M2 4v8a1 1 0 001 1h10a1 1 0 001-1V6a1 1 0 00-1-1H8L6.5 3.5 6 3H3a1 1 0 00-1 1z"
              stroke="currentColor"
              stroke-width="1.3"
            />
          </svg>
          <span class="setup__folder-btn-text">Select folder...</span>
        </button>
      </div>
      <div class="setup__divider"></div>
      <div class="setup__row">
        <div class="setup__group setup__group--half">
          <label class="setup__label">Font Size</label>
          <input id="fontSizeInput" class="setup__input" type="number" min="8" max="24" value="13" />
        </div>
        <div class="setup__group setup__group--half">
          <label class="setup__label">Theme</label>
          <select id="themeSelect" class="setup__input setup__select">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="monokai">Monokai</option>
            <option value="dracula">Dracula</option>
          </select>
        </div>
      </div>
      <label class="setup__toggle">
        <input id="skipPermToggle" type="checkbox" checked />
        <span class="setup__toggle-label">Skip permissions (--dangerously-skip-permissions)</span>
      </label>
      <button id="connectBtn" class="setup__connect-btn" disabled>
        Connect
      </button>
    </div>
    <div id="status" class="status">Connecting...</div>
    <div id="terminal"></div>
    <div id="statusbar" class="statusbar"></div>
    <script src="libs/xterm/xterm.js"></script>
    <script src="libs/xterm/addon-fit.js"></script>
    <!-- View -->
    <script src="extension/panel/view/status.view.js"></script>
    <script src="extension/panel/view/terminal.view.js"></script>
    <!-- Service -->
    <script src="extension/panel/service/terminal.service.js"></script>
    <script src="extension/panel/service/control.service.js"></script>
    <!-- Feature -->
    <script src="extension/panel/feature/picker.feature.js"></script>
    <!-- Entry -->
    <script src="sidepanel.js"></script>
  </body>
</html>
